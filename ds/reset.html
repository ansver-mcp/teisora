<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atkurti slaptažodį – Teisora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ═══ HEADER ════════════════════════════════════════════════════ -->
<header>
  <div class="rapper">
    <div class="site-header">
      <a href="index.html" class="header-logo">Teiso<span>ra</span></a>
      <div class="header-right">
        <span class="sign-in auth-hint">Prisiminėte?</span>
        <a href="login.html" class="button sm">Prisijungti</a>
      </div>
    </div>
  </div>
</header>

<!-- ═══ RESET ═════════════════════════════════════════════════════ -->
<main class="auth-main">
  <div class="auth-card">
    <div class="auth-head">
      <h1>Atkurti slaptažodį</h1>
      <p>Įveskite el. paštą — atsiųsime atkūrimo nuorodą.</p>
    </div>

    <!-- Real form: Enter submits, GET returns to login (static prototype). -->
    <form action="login.html" method="get">
      <div class="field">
        <label for="email">El. paštas</label>
        <input id="email" name="email" type="email" class="element" autocomplete="email" required placeholder="vardas@advokatai.lt">
      </div>
      <button type="submit" class="button auth-submit">Siųsti nuorodą</button>
    </form>

    <p class="auth-foot">Prisiminėte slaptažodį? <a href="login.html">Prisijungti</a></p>
  </div>
</main>

</body>
</html>
